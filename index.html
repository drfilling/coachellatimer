<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful countdown timer with days, hours, minutes, and seconds">
    <title>Coachella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hidden YouTube embed for background music -->
    <iframe id="yt-player"
        src="https://www.youtube.com/embed/S85q2xSpwUI?autoplay=1&loop=1&playlist=S85q2xSpwUI&controls=0&showinfo=0&mute=0&enablejsapi=1"
        allow="autoplay; encrypted-media" style="position:absolute;width:0;height:0;border:none;overflow:hidden;"
        title="Background Music"></iframe>

    <!-- Music toggle button -->
    <button id="music-toggle" class="music-toggle" title="Toggle Music">
        <svg id="music-icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
        <svg id="music-icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
            <line x1="1" y1="1" x2="23" y2="23" stroke-width="2.5" />
        </svg>
    </button>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <h1 class="title">Coachella</h1>

        <div class="input-section glass-card">
            <div class="input-row">
                <div class="input-group">
                    <label for="target-date">Date</label>
                    <input type="date" id="target-date">
                </div>
                <div class="input-group">
                    <label for="target-time">Time</label>
                    <input type="time" id="target-time" value="00:00">
                </div>
                <button id="start-btn" class="btn-start">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Start
                </button>
            </div>
            <div class="quick-presets">
                <button class="preset-btn" data-minutes="5">5 min</button>
                <button class="preset-btn" data-minutes="15">15 min</button>
                <button class="preset-btn" data-minutes="30">30 min</button>
                <button class="preset-btn" data-minutes="60">1 hour</button>
                <button class="preset-btn" data-minutes="1440">1 day</button>
            </div>
        </div>

        <div id="timer-display" class="timer-display hidden">
            <div class="timer-cards">
                <div class="timer-card glass-card">
                    <span class="timer-value" id="days">00</span>
                    <span class="timer-label">Days</span>
                    <div class="card-glow"></div>
                </div>
                <div class="timer-card glass-card">
                    <span class="timer-value" id="hours">00</span>
                    <span class="timer-label">Hours</span>
                    <div class="card-glow"></div>
                </div>
                <div class="timer-card glass-card">
                    <span class="timer-value" id="minutes">00</span>
                    <span class="timer-label">Minutes</span>
                    <div class="card-glow"></div>
                </div>
                <div class="timer-card glass-card">
                    <span class="timer-value" id="seconds">00</span>
                    <span class="timer-label">Seconds</span>
                    <div class="card-glow"></div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="event-label" id="event-label"></p>
            </div>

            <div id="weather-widget" class="weather-widget glass-card">
                <div class="weather-loading" id="weather-loading">
                    <span class="weather-spinner"></span> Fetching forecast…
                </div>
                <div class="weather-days hidden" id="weather-content">
                    <div class="weather-day-label">🌵 Indio, CA Weekend Forecast</div>
                    <div class="weather-days-grid" id="weather-days-grid">
                        <!-- Filled by JS -->
                    </div>
                </div>
                <div class="weather-error hidden" id="weather-error">⚠️ Forecast unavailable</div>
            </div>

            <div class="controls">
                <button id="reset-btn" class="btn-reset">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                    Reset
                </button>
            </div>
        </div>

        <div id="finished-message" class="finished-message hidden">
            <div class="celebration">🎉</div>
            <h2>Time's Up!</h2>
            <p>The countdown has finished.</p>
            <button id="restart-btn" class="btn-start">Start New Timer</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
